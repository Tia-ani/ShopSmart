version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: pawfect-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - pawfect-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pawfect-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/pawfect?authSource=admin
    depends_on:
      - mongodb
    networks:
      - pawfect-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://13.51.79.11:3000
    container_name: pawfect-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - pawfect-network

volumes:
  mongodb_data:

networks:
  pawfect-network:
    driver: bridge
