name: CI/CD Pipeline — Pawfect FurEver

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─── Backend: Lint, Test, Build ───────────────────────────────
  backend:
    name: Backend — Lint, Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'

      - name: Install Dependencies
        run: npm install

      - name: Run Linter
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Run Integration Tests
        run: npm run test:integration

      - name: Run All Tests with Coverage
        run: npm run test:coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: ./server/coverage/

      - name: Build Docker Image
        run: docker build -t pawfect-server:${{ github.sha }} .

  # ─── Frontend: Lint, Test, Build ─────────────────────────────
  frontend:
    name: Frontend — Lint, Tests, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run Frontend Tests
        run: npm test -- --run

      - name: Build Production Bundle
        run: npm run build
        env:
          VITE_API_URL: https://api.pawfect-furever.com

      - name: Build Docker Image
        run: docker build -t pawfect-client:${{ github.sha }} .

  # ─── Security: Dependency Audit ──────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Audit Backend Dependencies
        working-directory: ./server
        run: npm audit --audit-level=high || true

      - name: Audit Frontend Dependencies
        working-directory: ./client
        run: npm audit --audit-level=high || true


