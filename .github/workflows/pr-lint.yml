name: PR Linting Check

on:
  pull_request:
    branches: [ "main", "develop" ]
    types: [opened, synchronize, reopened]

jobs:
  lint-backend:
    name: Lint Backend Code
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint (Fail on errors)
        run: npm run lint
        # This WILL fail the PR if lint errors are found

  lint-frontend:
    name: Lint Frontend Code
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint (Fail on errors)
        run: npm run lint
        # PR is blocked if lint fails

  pr-comment:
    name: Post Lint Summary
    needs: [lint-backend, lint-frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report Status
        run: |
          if [[ "${{ needs.lint-backend.result }}" == "success" && "${{ needs.lint-frontend.result }}" == "success" ]]; then
            echo "✅ All lint checks passed! PR is ready for review."
          else
            echo "❌ Lint checks failed! Please fix lint errors before merging."
            exit 1
          fi
